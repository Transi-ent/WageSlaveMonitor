{{define "login"}}
{{template "layout" .}}
{{end}}

{{define "content"}}
<h1>Console Login</h1>
{{if .Error}}<p style="color:red">{{.Error}}</p>{{end}}
<form method="post" action="/console/login">
  <label>Password:</label>
  <input type="password" name="password" />
  <button type="submit">Login</button>
</form>
{{end}}
